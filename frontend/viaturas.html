<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0056b3">
    <title>GML - Controle de Viaturas</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/viaturas.css">
</head>

<body>

    <header id="headerUsuario"></header>

    <div class="container">

        <header class="topbar">
            <div class="topbar-left">
                <h1>GML - Controle de Viaturas</h1>
                <p>Sistema de Gestão de Frota</p>
            </div>
        </header>

        <div class="forms-wrapper">

            <!-- SAÍDA -->
            <div class="form-container">
                <form id="saidaViaturaForm">
                    <div class="header">Nova Saída de Viatura</div>

                    <div class="form-body">

                        <div class="form-group">
                            <label class="required">Viatura</label>
                            <select name="viatura" required>
                                <option value="">Selecione...</option>
                                <option>Nissan Frontier 0110</option>
                                <option>Chevrolet S10 0111</option>
                                <option>Vectra 0112</option>
                                <option>MOTO GM07</option>
                            </select>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="required">Km Saída</label>
                                <input type="number" name="km_saida" required>
                            </div>

                            <div class="form-group">
                                <label>Protocolo</label>
                                <input type="number" name="protocolo">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="required">Motorista</label>
                            <select name="motorista" required>
                                <option value="">Selecione...</option>
                                <option>Jacques</option>
                                <option>Leandro</option>
                                <option>Arlon</option>
                            </select>
                        </div>

                    </div>

                    <div class="buttons">
                        <button type="reset" class="btn btn-secondary">Limpar</button>
                        <button type="submit" class="btn btn-primary">Registrar</button>
                    </div>
                </form>
            </div>

            <!-- ABASTECIMENTO -->
            <div class="form-container">
                <div class="header">Controle de Abastecimento</div>

                <form id="abastecimentoForm">
                    <div class="form-body">

                        <div class="form-group">
                            <label class="required">Viatura</label>
                            <select name="viatura_abastecimento" required>
                                <option value="">Selecione...</option>
                                <option>Nissan Frontier 0110</option>
                                <option>Chevrolet S10 0111</option>
                                <option>Vectra 0112</option>
                                <option>MOTO GM07</option>
                            </select>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="required">Data</label>
                                <input type="date" name="data_abastecimento" required>
                            </div>

                            <div class="form-group">
                                <label class="required">KM Abastecimento</label>
                                <input type="number" name="km_abastecimento" required>
                            </div>

                            <div class="form-group">
                                <label class="required">KM Atual</label>
                                <input type="number" name="km_atual" required>
                            </div>

                            <div class="form-group">
                                <label class="required">Litros</label>
                                <input type="number" step="0.01" name="litros" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="required">Motorista</label>
                            <select name="motorista_abastecimento" required>
                                <option value="">Selecione...</option>
                                <option>Jacques</option>
                                <option>Leandro</option>
                                <option>Arlon</option>
                            </select>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>KM Rodado</label>
                                <input type="text" readonly>
                            </div>

                            <div class="form-group">
                                <label>Média KM/L</label>
                                <input type="text" readonly>
                            </div>
                        </div>

                    </div>

                    <div class="buttons">
                        <button type="reset" class="btn btn-secondary">Limpar</button>
                        <button type="submit" class="btn btn-primary">Registrar Abastecimento</button>
                    </div>

                </form>
            </div>

        </div>

    </div>

</body>

</html>
