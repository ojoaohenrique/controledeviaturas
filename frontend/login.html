<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0056b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="GML - Controle de Viaturas da Guarda Municipal de Laguna">
    <title>GML - Login</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login.css" />
    <style>
        .senha-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        #senha {
            padding-right: 40px;
            /* Evita que o texto fique embaixo do ícone */
        }

        .toggle-senha-btn {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1>GML - Controle de Viaturas</h1>
            <p class="login-subtitle">Acesse com seu e-mail institucional.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required />
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="senha-container">
                        <input type="password" id="senha" name="senha" required />
                        <button type="button" class="toggle-senha-btn" onclick="toggleSenha()"
                            title="Mostrar/Ocultar Senha">👁️</button>
                    </div>
                </div>
                <p id="loginErro" class="login-error" style="display: none;"></p>
                <button type="submit" class="btn btn-primary btn-full">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/js/env.js"></script>
    <!-- Configuration - Set your Supabase credentials here or via environment variables -->
    <script>
        // Production: These will be injected by your deployment platform
        // Development: Set your local Supabase credentials here
        window.ENV_SUPABASE_URL = window.ENV_SUPABASE_URL || localStorage.getItem('SUPABASE_URL') || '';
        window.ENV_SUPABASE_ANON_KEY = window.ENV_SUPABASE_ANON_KEY || localStorage.getItem('SUPABASE_ANON_KEY') || '';
        window.ENV_API_BASE_URL = window.ENV_API_BASE_URL || (window.location.hostname === 'localhost' ? 'http://localhost:5000/api' : '/api');
    </script>
    <script src="js/config.js"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Validate configuration
            if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
                console.error('Supabase configuration missing. Please set your credentials in localStorage or environment variables.');
                alert('Configuração do Supabase não encontrada. Por favor, configure as credenciais.');
            }
            initLoginPage();
            registerPWA();
        });

        function toggleSenha() {
            const senhaInput = document.getElementById('senha');
            const toggleBtn = document.querySelector('.toggle-senha-btn');

            if (senhaInput.type === 'password') {
                senhaInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                senhaInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }
    </script>
</body>

</html>
